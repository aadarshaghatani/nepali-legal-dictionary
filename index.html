<!DOCTYPE html>
<html lang="ne" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyayakosh — न्यायकोश</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="header-rule-top"></div>
            <div class="header-title-block">
                <h1 class="title-latin">Nyayakosh</h1>
                <h1 class="title-nepali">न्यायकोश</h1>
            </div>
            <div class="header-rule-bottom"></div>
        </div>
    </header>

    <main>

        <!-- Sticky search wrapper -->
        <div class="search-sticky-wrapper" id="search-sticky-wrapper">
            <div class="search-container">
                <div class="search-wrapper">
                   <!-- <span class="search-icon">⌕</span> --->
                    <input type="text" id="search-input" placeholder="शब्द वा परिभाषा खोज्नुहोस्…" autocomplete="off" spellcheck="false">
                 <!--   <button id="clear-search" class="clear-btn" aria-label="Clear search">×</button>-->
                </div>
                <div id="result-count" class="result-count"></div>
            </div>
        </div>

        <div id="search-results" class="results" role="list"></div>

        <div class="browse-section">
            <h2 class="browse-heading">वर्णानुक्रम</h2>
            <div class="browse-letters" id="browse-letters">
                <span class="browse-letter" data-letter="अ">अ</span>
                <span class="browse-letter" data-letter="आ">आ</span>
                <span class="browse-letter" data-letter="इ">इ</span>
                <span class="browse-letter" data-letter="ई">ई</span>
                <span class="browse-letter" data-letter="उ">उ</span>
                <span class="browse-letter" data-letter="ऊ">ऊ</span>
                <span class="browse-letter" data-letter="ए">ए</span>
                <span class="browse-letter" data-letter="ओ">ओ</span>
                <span class="browse-letter" data-letter="क">क</span>
                <span class="browse-letter" data-letter="ख">ख</span>
                <span class="browse-letter" data-letter="ग">ग</span>
                <span class="browse-letter" data-letter="घ">घ</span>
                <span class="browse-letter" data-letter="ङ">ङ</span>
                <span class="browse-letter" data-letter="च">च</span>
                <span class="browse-letter" data-letter="छ">छ</span>
                <span class="browse-letter" data-letter="ज">ज</span>
                <span class="browse-letter" data-letter="झ">झ</span>
                <span class="browse-letter" data-letter="ञ">ञ</span>
                <span class="browse-letter" data-letter="ट">ट</span>
                <span class="browse-letter" data-letter="ठ">ठ</span>
                <span class="browse-letter" data-letter="ड">ड</span>
                <span class="browse-letter" data-letter="ढ">ढ</span>
                <span class="browse-letter" data-letter="ण">ण</span>
                <span class="browse-letter" data-letter="त">त</span>
                <span class="browse-letter" data-letter="थ">थ</span>
                <span class="browse-letter" data-letter="द">द</span>
                <span class="browse-letter" data-letter="ध">ध</span>
                <span class="browse-letter" data-letter="न">न</span>
                <span class="browse-letter" data-letter="प">प</span>
                <span class="browse-letter" data-letter="फ">फ</span>
                <span class="browse-letter" data-letter="ब">ब</span>
                <span class="browse-letter" data-letter="भ">भ</span>
                <span class="browse-letter" data-letter="म">म</span>
                <span class="browse-letter" data-letter="य">य</span>
                <span class="browse-letter" data-letter="र">र</span>
                <span class="browse-letter" data-letter="ल">ल</span>
                <span class="browse-letter" data-letter="व">व</span>
                <span class="browse-letter" data-letter="श">श</span>
                <span class="browse-letter" data-letter="ष">ष</span>
                <span class="browse-letter" data-letter="स">स</span>
                <span class="browse-letter" data-letter="ह">ह</span>
                <span class="browse-letter" data-letter="क्ष">क्ष</span>
                <span class="browse-letter" data-letter="त्र">त्र</span>
                <span class="browse-letter" data-letter="ज्ञ">ज्ञ</span>
            </div>
        </div>

        <div class="info-buttons">
            <div id="abbr-tooltip" class="abbr-tooltip hidden"></div>
            <button id="show-abbr" class="text-button">सङ्केत सूची</button>
            <button id="show-about" class="text-button">यस एपबारे</button>
        </div>
        <div id="info-panel" class="info-panel hidden"></div>

        <div id="browse-results" class="results" role="list"></div>
    </main>


    <footer>
        <p class="footer-text">digitized by aadarsha ghatani</p>
    </footer>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered', reg))
                    .catch(err => console.log('SW registration failed', err));
            });
        }
    </script>
</body>
</html>
